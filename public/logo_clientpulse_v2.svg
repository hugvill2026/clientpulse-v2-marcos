<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definitions -->
  <defs>
    <linearGradient id="brand-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488" /> <!-- teal-600 -->
      <stop offset="100%" style="stop-color:#0EA5E9" /> <!-- sky-500 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Hexagonal Shield Base (Modern & Secure) -->
  <rect x="35" y="35" width="130" height="130" rx="40" fill="#0F172A" /> <!-- slate-900 -->
  
  <!-- Subtle Grid Pattern in background -->
  <circle cx="100" cy="100" r="45" stroke="rgba(255,255,255,0.05)" stroke-width="2" stroke-dasharray="2 4" />

  <!-- The "Pulse" Element -->
  <path d="M60 110L85 110L95 80L105 130L115 90L125 110L140 110" 
        stroke="url(#brand-gradient)" 
        stroke-width="8" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)" />
        
  <!-- Client Dot (The Focus) -->
  <circle cx="140" cy="110" r="12" fill="url(#brand-gradient)" />
  <circle cx="140" cy="110" r="6" fill="white" />
</svg>
